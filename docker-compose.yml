# docker-compose untuk Coolify (mode "Docker Compose")
# Environment variables yang harus di-set di Coolify (tab Environment Variables):
#   APP_BASE_URL          → URL aplikasi dengan trailing slash (mis. http://abc.sslip.io/)
#   FORCE_HTTPS           → true / false (default false; set true kalau pakai SSL)
#   MYSQL_ROOT_PASSWORD   → password root MariaDB
#   MYSQL_DATABASE        → nama database (default db_letter)
#   MYSQL_USER            → user database (default letter_user)
#   MYSQL_PASSWORD        → password user database

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    environment:
      # Trigger Coolify mengarahkan domain ke port 80 service ini
      - SERVICE_FQDN_APP_80
      # Konfigurasi CI4 (diterjemahkan ke file .env oleh entrypoint.sh)
      - CI_ENVIRONMENT=${CI_ENVIRONMENT:-production}
      - APP_BASE_URL=${APP_BASE_URL}
      - FORCE_HTTPS=${FORCE_HTTPS:-false}
      # Database
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE:-db_letter}
      - DB_USERNAME=${MYSQL_USER:-letter_user}
      - DB_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - uploads:/var/www/html/uploads
      - writable:/var/www/html/writable
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  mariadb:
    build:
      context: .
      dockerfile: docker/mariadb.Dockerfile
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-db_letter}
      - MYSQL_USER=${MYSQL_USER:-letter_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  uploads:
  writable:
  db_data:
